name: "Terraform Deploy"

on:
  push:
    tags:
      - "v*"

jobs:
  validar:
    name: "Calidad y Seguridad"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
      - name: Run TFLint
        run: |
          tflint --init
          tflint -f compact

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: true
          skip_check: >-
            CKV_AWS_135,
            CKV_AWS_130,
            CKV_AWS_24,
            CKV_AWS_260

      - name: Terraform Init (sin backend)
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - name: Run OPA Policy Tests
        run: opa test policies/ -v

  desplegar:
    name: "Despliegue en AWS"
    runs-on: ubuntu-latest
    needs: validar

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=auy1105/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform Plan
        env:
          TF_VAR_subscription_email: ${{ secrets.SUBSCRIPTION_EMAIL }}
          TF_VAR_ssh_allowed_ip: ${{ secrets.SSH_ALLOWED_IP }}
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_key_name: ${{ secrets.KEY_PAIR_NAME }}
        run: |
          terraform plan -out=tfplan
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
