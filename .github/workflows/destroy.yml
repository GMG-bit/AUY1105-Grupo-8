name: "Terraform Destroy"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "destroy" para confirmar la destruccion de la infraestructura'
        required: true
        type: string

jobs:
  destroy:
    name: "Destruir Infraestructura"
    runs-on: ubuntu-latest
    environment: destroy

    steps:
      - name: Verificar confirmacion
        if: ${{ inputs.confirm != 'destroy' }}
        run: |
          echo "ERROR: Debes escribir 'destroy' exactamente para confirmar."
          exit 1

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=auy1105/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var "project_name=${{ vars.PROJECT_NAME }}" \
            -var "key_name=${{ secrets.KEY_PAIR_NAME }}"
